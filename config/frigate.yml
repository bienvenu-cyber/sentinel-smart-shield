# Documentation : https://docs.frigate.video

mqtt:
  host: mosquitto
  port: 1883

# --- Détecteur ---
detectors:
  cpu1:
    type: cpu
    num_threads: 4
  # Décommenter pour Intel OpenVINO :
  # openvino:
  #   type: openvino
  #   device: AUTO
  # Décommenter pour Google Coral USB TPU :
  # coral:
  #   type: edgetpu
  #   device: usb

# --- Configuration globale ---
objects:
  track:
    - person
    - car
    - truck
    - motorcycle
  filters:
    person:
      min_score: 0.70
      min_area: 8000
    car:
      min_score: 0.65
      min_area: 15000
    truck:
      min_score: 0.65
      min_area: 20000
    motorcycle:
      min_score: 0.65
      min_area: 8000

snapshots:
  enabled: true
  bounding_box: true
  timestamp: true
  retain:
    default: 14

record:
  enabled: true
  retain:
    days: 14
    mode: motion
  events:
    retain:
      default: 30
      mode: active_objects

# --- Caméras ---
cameras:

  # --- Caméra EZVIZ CS-C6N (1080p H.264) ---
  # Flux RTSP : rtsp://admin:<CODE_VERIF>@<IP>:554/Streaming/Channels/101
  cam_ezviz:
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@{FRIGATE_CAM_EZVIZ_IP}:{FRIGATE_CAM_EZVIZ_PORT}{FRIGATE_CAM_EZVIZ_PATH}
          roles: [detect, record]
          input_args: preset-rtsp-restream
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    # --- Zones à dessiner via l'UI Frigate (Edit zones) ---
    # zone_travail    : surface où les opérateurs ont le droit d'être en journée
    # zone_restreinte : bureau / stockage produits finis (interdit même de jour)
    # zone_entree     : porte d'accès principale (toute personne = à signaler la nuit)
    zones:
      zone_travail:
        coordinates: 0,1080,1920,1080,1920,400,0,400
        objects:
          - person
      zone_restreinte:
        coordinates: 0,400,960,400,960,0,0,0
        objects:
          - person
      zone_entree:
        coordinates: 960,400,1920,400,1920,0,960,0
        objects:
          - person
