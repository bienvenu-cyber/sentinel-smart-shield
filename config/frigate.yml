# Documentation : https://docs.frigate.video

mqtt:
  host: mosquitto
  port: 1883

# --- Détecteur ---
detectors:
  cpu1:
    type: cpu
    num_threads: 4
  # Décommenter pour Intel OpenVINO :
  # openvino:
  #   type: openvino
  #   device: AUTO
  # Décommenter pour Google Coral USB TPU :
  # coral:
  #   type: edgetpu
  #   device: usb

# --- Configuration globale ---
objects:
  track:
    - person
    - car
    - truck
    - motorcycle
  filters:
    person:
      min_score: 0.70
      # min_area abaissée : 1500 px² ≈ silhouette de 40×40 px
      # → détecte une personne même à mi-distance / en arrière-plan
      min_area: 1500
    car:
      min_score: 0.65
      min_area: 5000
    truck:
      min_score: 0.65
      min_area: 8000
    motorcycle:
      min_score: 0.65
      min_area: 3000

snapshots:
  enabled: true
  bounding_box: true
  timestamp: true
  retain:
    default: 14

record:
  enabled: true
  retain:
    days: 14
    mode: motion
  events:
    retain:
      default: 30
      mode: active_objects

# --- Caméras ---
cameras:

  # --- Rôtissage CAM 1 (EZVIZ CS-C6N, 1080p H.264) — ENTRÉE ---
  # Posée au-dessus de la porte d'accès rôtissage.
  # Toute détection de personne déclenche une alerte (Règle 2).
  rotissage_cam1:
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_CAM_ROTISSAGE1_PASSWORD}@{FRIGATE_CAM_ROTISSAGE1_IP}:{FRIGATE_CAM_ROTISSAGE1_PORT}{FRIGATE_CAM_ROTISSAGE1_PATH}
          roles: [detect, record]
          input_args: preset-rtsp-restream
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    # --- Zones à dessiner via l'UI Frigate (Edit zones) ---
    # zone_entree     : porte d'accès principale (toute personne = à signaler)
    # zone_exterieur  : abords extérieurs visibles dans le champ
    zones:
      zone_entree:
        coordinates: 0,1080,1920,1080,1920,400,0,400
        objects:
          - person
      zone_exterieur:
        coordinates: 0,400,1920,400,1920,0,0,0
        objects:
          - person

  # --- Rôtissage CAM 2 (EZVIZ CS-C6N) — INTÉRIEUR production ---
  # Posée à l'intérieur de la zone de production rôtissage.
  # Règle 3 (reprise d'activité après 1 h sans détection) en journée.
  # Démarrage avec "enabled: False" → Frigate ne lance pas ffmpeg
  # tant que la cam n'est pas joignable. Le service "cam-watcher"
  # (cf. docker-compose.yml) ping la cam toutes les 60 s et publie
  # sur MQTT (frigate/rotissage_cam2/enabled/set ON|OFF) pour
  # l'activer/désactiver automatiquement selon son état réseau.
  rotissage_cam2:
    enabled: False
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_CAM_ROTISSAGE2_PASSWORD}@{FRIGATE_CAM_ROTISSAGE2_IP}:{FRIGATE_CAM_ROTISSAGE2_PORT}{FRIGATE_CAM_ROTISSAGE2_PATH}
          roles: [detect, record]
          input_args: preset-rtsp-restream
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
    # Zones à dessiner via l'UI Frigate :
    # zone_travail    : surface où les opérateurs ont le droit d'être en journée
    # zone_restreinte : stockage produits finis (interdit même de jour)
