# Documentation : https://docs.frigate.video

mqtt:
  host: mosquitto
  port: 1883

# --- Détecteur ---
detectors:
  cpu1:
    type: cpu
    num_threads: 4
  # Décommenter pour Intel OpenVINO :
  # openvino:
  #   type: openvino
  #   device: AUTO
  # Décommenter pour Google Coral USB TPU :
  # coral:
  #   type: edgetpu
  #   device: usb

# --- Configuration globale ---
objects:
  track:
    - person
    - car
  filters:
    person:
      min_score: 0.6
      min_area: 5000
    car:
      min_score: 0.6
      min_area: 10000

snapshots:
  enabled: true
  bounding_box: true
  timestamp: true
  retain:
    default: 7

record:
  enabled: true
  retain:
    days: 7
    mode: motion
  events:
    retain:
      default: 14
      mode: active_objects

# --- Caméras ---
cameras:

  # --- Caméra EZVIZ CS-C6N (1080p H.264) ---
  # Flux RTSP : rtsp://admin:<CODE_VERIF>@<IP>:554/Streaming/Channels/101
  cam_ezviz:
    ffmpeg:
      inputs:
        - path: rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@{CAM_EZVIZ_IP}:{CAM_EZVIZ_PORT}{CAM_EZVIZ_PATH}
          roles: [detect, record]
          input_args: preset-rtsp-restream
    detect:
      enabled: true
      width: 1920
      height: 1080
      fps: 5
